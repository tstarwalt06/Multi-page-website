<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tyler Starwalt | Contact</title>
  <link rel="stylesheet" href="../styles/style.css" />
</head>

<body>
  <header>
    <div class="container stack">
      <h1>Contact</h1>
      <p class="muted">Send a message using the form below.</p>

      <nav aria-label="Primary">
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li>
            <a href="https://github.com/tstarwalt06" target="_blank" rel="noopener noreferrer">
              GitHub
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="container stack-lg">
      <section class="card stack" aria-labelledby="form-title">
        <h2 id="form-title">Message Form</h2>

        <form class="stack" action="#" method="post">
          <div class="stack">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required minlength="2" autocomplete="name">
          </div>

          <div class="stack">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email">
          </div>

          <div class="stack">
            <label for="topic">Topic</label>
            <select id="topic" name="topic" required>
              <option value="">Choose one…</option>
              <option value="project">Project question</option>
              <option value="collab">Collaboration</option>
              <option value="other">Other</option>
            </select>
          </div>

          <fieldset class="stack">
            <legend>Preferred contact method</legend>

            <div>
              <input id="contact-email" name="preferred_contact" type="radio" value="email" required>
              <label for="contact-email">Email</label>
            </div>

            <div>
              <input id="contact-phone" name="preferred_contact" type="radio" value="phone">
              <label for="contact-phone">Phone</label>
            </div>
          </fieldset>

          <div class="stack">
            <label for="message">Message</label>
            <textarea id="message" name="message" required minlength="10"></textarea>
          </div>

          <button type="submit">Submit</button>
        </form>
      </section>
    </div>
  </main>

  <footer>
    <div class="container stack">
      <p>© 2026 Tyler Starwalt</p>
      <p>
        <a href="https://www.linkedin.com/" target="_blank" rel="noopener noreferrer">
          LinkedIn
        </a>
      </p>
    </div>
  </footer>
</body>
</html>
